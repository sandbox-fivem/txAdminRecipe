$engine: 3
$onesync: on

name: Sandbox Framework
version: v1.0.0
author: sandbox-fivem
description: >
  An advanced FiveM RP framework including jobs, gangs, housing & more!
  Includes banking, inventory, vehicles, drugs, casino, and more.
  Requires MariaDB/MySQL. Visit https://sandboxrp.gg for more info.

tasks:
  # -----------------------------------------------
  # Download this recipe repo (has server.prod.cfg,
  # database.sql and logo.png already inside it)
  # -----------------------------------------------
  - action: download_github
    src: https://github.com/sandbox-fivem/txAdminRecipe
    ref: main
    dest: ./tmp/sandbox-recipe

  - action: move_path
    src: ./tmp/sandbox-recipe/server.prod.cfg
    dest: ./server.cfg

  - action: move_path
    src: ./tmp/sandbox-recipe/logo.png
    dest: ./logo.png

  # -----------------------------------------------
  # Database — import SQL from this same repo
  # -----------------------------------------------
  - action: connect_database

  - action: query_database
    file: ./tmp/sandbox-recipe/database.sql

  # -----------------------------------------------
  # Download config repo and place each file
  # into the ./config/ folder where server.cfg execs them
  # -----------------------------------------------
  - action: download_github
    src: https://github.com/sandbox-fivem/config
    ref: main
    dest: ./tmp/sandbox-config

  - action: move_path
    src: ./tmp/sandbox-config/database.prod.cfg
    dest: ./config/database.prod.cfg

  - action: move_path
    src: ./tmp/sandbox-config/mongodb.prod.cfg
    dest: ./config/mongodb.prod.cfg

  - action: move_path
    src: ./tmp/sandbox-config/core.prod.cfg
    dest: ./config/core.prod.cfg

  - action: move_path
    src: ./tmp/sandbox-config/admins.cfg
    dest: ./config/admins.cfg

  - action: move_path
    src: ./tmp/sandbox-config/resources.cfg
    dest: ./config/resources.cfg

  - action: move_path
    src: ./tmp/sandbox-config/voice.cfg
    dest: ./config/voice.cfg

  - action: move_path
    src: ./tmp/sandbox-config/prod.logs.cfg
    dest: ./config/prod.logs.cfg

  # Inject txAdmin DB credentials into database.prod.cfg
  # ⚠️  You must update database.prod.cfg in your config repo so the
  #     connection string line reads exactly:
  #       set mysql_connection_string "{{dbConnectionString}}"
  #     txAdmin will then replace {{dbConnectionString}} automatically.
  - action: replace_string
    mode: all_vars
    file: ./config/database.prod.cfg

  # -----------------------------------------------
  # CFX default server data
  # -----------------------------------------------
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    subpath: resources
    dest: ./resources/[cfx-default]

  # Remove default chat — sandbox-chat3 replaces it
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/chat

  # -----------------------------------------------
  # Dependencies
  # -----------------------------------------------
  - action: download_file
    path: ./tmp/oxmysql.zip
    url: https://github.com/communityox/oxmysql/releases/latest/download/oxmysql.zip

  - action: unzip
    src: ./tmp/oxmysql.zip
    dest: ./resources/[ox]

  - action: download_file
    path: ./tmp/ox_lib.zip
    url: https://github.com/communityox/ox_lib/releases/latest/download/ox_lib.zip

  - action: unzip
    src: ./tmp/ox_lib.zip
    dest: ./resources/[ox]

  - action: download_file
    path: ./tmp/screenshot-basic.zip
    url: https://github.com/project-error/screenshot-basic/releases/latest/download/screenshot-basic.zip

  - action: unzip
    src: ./tmp/screenshot-basic.zip
    dest: ./resources/screenshot-basic

  - action: waste_time # prevent GitHub throttling
    seconds: 10

  # -----------------------------------------------
  # Sandbox Framework — confirmed public repos
  # -----------------------------------------------

